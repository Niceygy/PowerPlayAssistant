<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Megaships results from PowerPlay Assistant!" />
    <link rel="stylesheet" href="/static/css/main.css" />
    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon" />
    <script defer src="https://data.niceygy.net/script.js" ></script>
    <title>PowerPlay Assistant - Megaships</title>
    <script>
      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(function () {
              alert("Copied " + text);
            })
            .catch(function (err) {
              console.error("Could not copy text: ", err);
            });
        } else {
          // Fallback method
          let textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand("copy");
            alert("Copied " + text);
          } catch (err) {
            console.error("Fallback: Oops, unable to copy", err);
            alert("Failed to copy :( Please report this")
          }
          document.body.removeChild(textarea);
        }
      }
      window.onload = function() {        
        umami.track(`megaships`);
        umami.track("{{ .power }}")
    };
    </script>
  </head>
  <body>
    <div class="main">
      <h1>Selected Options</h1>
      <p><strong>System:</strong> {{ .system }}</p>
      <p><strong>Power(s):</strong> {{ .powers }}</p>
      <p><strong>System States:</strong> {{ .states }}</p>



      <h1>Megaships:</h1>
      <p><strong>{{ .extraInfo }}</strong></p>
      <ul>
        {{ range $name, $system := .megaships }}
        <li>
          {{ $name }} - In <a onclick="copyText('{{ $system }})'">{{ $system }}</a> 
        </li>
        {{ end }}
      </ul>
      <br />
      <p><i>Click the system name to copy it</i></p>

      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
